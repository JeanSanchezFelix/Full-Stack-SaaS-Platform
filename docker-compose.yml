services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdb-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-scooter_de_la_bahia};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-this-password}
    expose:
      - "8080"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: sdb-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scooter_de_la_bahia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scooter_de_la_bahia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
